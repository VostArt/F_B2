<div class="home-content">
    <h3 style="color: var(--neon-blue)">📝 Новая задача</h3>
    <form id="note-form">
        <input type="text" id="note-input" placeholder="Что сделать?" required>
        <button type="submit">Добавить</button>
    </form>

    <h3 style="color: var(--neon-red); margin-top: 30px;">⏰ Будильник</h3>
    <form id="reminder-form">
        <input type="text" id="reminder-text" placeholder="О чем напомнить?" required>
        <input type="datetime-local" id="reminder-time" step="1" required> <!-- step="1" включает секунды -->
        <button type="submit">Завести будильник</button>
    </form>

    <ul id="notes-list"></ul>
</div>
